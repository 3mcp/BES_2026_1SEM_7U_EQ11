# Pipeline CI do projeto OlympycShare (Next.js + React + Vitest)
# Executa instalacao, testes unitarios e build em todo push para master
# e em todo Pull Request direcionado a master.

trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: $(NODE_VERSION)
  displayName: 'Install Node.js $(NODE_VERSION)'

- script: npm ci
  displayName: 'Install dependencies (npm ci)'

- script: npm test
  displayName: 'Run unit tests (Vitest)'

- script: npm run build
  displayName: 'Build production bundle (next build)'
